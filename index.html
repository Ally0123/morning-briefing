<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Morning Briefing</title>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-CZHDNBP96B"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-CZHDNBP96B');
</script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Serif+4:ital,wght@0,300;0,400;1,300&display=swap');

  :root {
    --ink: #0e1a2b;
    --paper: #f5f0e8;
    --cream: #ede8db;
    --rule: #c8b89a;
    --accent: #1a3a5c;
    --muted: #4a5a6e;
    --card: #faf7f2;
    --gold: #c8a84b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Source Serif 4', Georgia, serif;
    font-weight: 300;
    min-height: 100vh;
    padding: 0 0 80px 0;
  }

  .masthead {
    background: var(--ink);
    color: var(--paper);
    text-align: center;
    padding: 18px 20px 14px;
    border-bottom: 3px solid var(--gold);
  }

  .masthead h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.4rem, 5vw, 2rem);
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .dateline {
    font-size: 0.72rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gold);
    margin-top: 4px;
  }

  .controls {
    background: var(--cream);
    border-bottom: 1px solid var(--rule);
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .btn-row { display: flex; gap: 8px; }

  .run-btn {
    flex: 1;
    background: var(--accent);
    color: var(--paper);
    border: none;
    font-family: 'Playfair Display', serif;
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 12px 8px;
    cursor: pointer;
    border-radius: 2px;
    transition: background 0.2s;
  }

  .run-btn:hover { background: #0e2540; }
  .run-btn:disabled { background: var(--muted); cursor: not-allowed; }
  .run-btn.secondary { background: var(--ink); border: 1px solid var(--gold); }

  .filter-row { display: flex; flex-wrap: wrap; gap: 6px; }

  .filter-btn {
    background: var(--paper);
    border: 1px solid var(--rule);
    color: var(--muted);
    font-size: 0.68rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 5px 10px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.15s;
  }

  .filter-btn.active {
    background: var(--accent);
    border-color: var(--gold);
    color: var(--paper);
  }

  .status-bar {
    background: var(--ink);
    color: var(--gold);
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-align: center;
    padding: 8px;
    text-transform: uppercase;
    display: none;
  }

  .status-bar.visible { display: block; }

  .content-area {
    padding: 16px;
    max-width: 800px;
    margin: 0 auto;
  }

  .feed-section { margin-bottom: 24px; }

  .section-rule {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 0 0 12px;
  }

  .section-rule span {
    font-family: 'Playfair Display', serif;
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    white-space: nowrap;
  }

  .section-rule::before,
  .section-rule::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--rule);
  }

  .news-items { display: flex; flex-direction: column; gap: 8px; }

  .news-item {
    background: var(--card);
    border-left: 3px solid var(--rule);
    padding: 10px 14px;
    font-size: 0.85rem;
    line-height: 1.5;
    cursor: pointer;
    transition: border-color 0.15s;
  }

  .news-item:hover { border-left-color: var(--gold); }
  .news-item .headline { font-weight: 400; color: var(--ink); margin-bottom: 3px; }

  .news-item .summary {
    font-size: 0.78rem;
    color: var(--muted);
    margin-bottom: 4px;
    line-height: 1.4;
    display: none;
  }

  .news-item.expanded .summary { display: block; }
  .news-item .meta { font-size: 0.68rem; color: var(--rule); letter-spacing: 0.04em; }

  .news-item .read-more {
    font-size: 0.68rem;
    color: var(--gold);
    text-decoration: none;
    display: inline-block;
    margin-top: 4px;
  }

  .fed-card {
    background: var(--card);
    border: 1px solid var(--rule);
    border-radius: 2px;
    padding: 12px;
  }

  .fed-card .fed-label {
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .fed-card .fed-value {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem;
    font-weight: 600;
    color: var(--ink);
  }

  .fed-card .fed-sub {
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 2px;
  }

  .placeholder {
    color: var(--muted);
    font-style: italic;
    text-align: center;
    padding: 20px;
    font-size: 0.85rem;
  }
</style>
</head>
<body>

<div class="masthead">
  <div class="dateline" id="dateline"></div>
  <h1>Morning Briefing</h1>
</div>

<div class="controls">
  <div class="btn-row">
    <button class="run-btn" id="newsBtn" onclick="fetchAllFeeds()">Pull News</button>
    <button class="run-btn secondary" id="calBtn" onclick="toggleCalendar()">Economic Calendar</button>
  </div>
  <div class="btn-row">
    <button class="run-btn" id="fedBtn" onclick="fetchFedWatch()" style="background:#1a3a5c;border:1px solid var(--gold);">Fed Watch</button>
    <a href="https://alisdairmacdonald.substack.com" target="_blank"
       style="flex:1;display:block;background:var(--ink);color:var(--gold);text-align:center;padding:12px 8px;border-radius:2px;text-decoration:none;font-family:'Playfair Display',serif;font-size:0.85rem;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;border:1px solid var(--gold);">
      Newsletter &rarr;
    </a>
  </div>
  <button class="run-btn" id="analyseBtn" onclick="analyseHeadlines()" style="background:#c8a84b;color:#0e1a2b;border:1px solid #c8a84b;font-weight:700;">ChatGPT Analysis</button>

  <div id="analysisSection" style="display:none;margin-top:10px;">
    <div class="section-rule"><span>AI Briefing</span></div>
    <div id="analysisContent" style="font-family:'Source Serif 4',serif;font-size:0.95rem;line-height:1.7;color:var(--ink);padding:16px;background:var(--card);border:1px solid var(--rule);border-radius:2px;white-space:pre-wrap;"></div>
  </div>

  <div class="filter-row">
    <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" onclick="setFilter('central-banks', this)">Central Banks</button>
    <button class="filter-btn" onclick="setFilter('markets', this)">Markets</button>
    <button class="filter-btn" onclick="setFilter('geopolitics', this)">Geopolitics</button>
    <button class="filter-btn" onclick="setFilter('newsletter', this)">Newsletter</button>
  </div>
</div>

<div class="status-bar" id="statusBar">Fetching...</div>

<div class="content-area">
  <div id="fedSection" style="display:none;margin-bottom:24px;">
    <div class="section-rule"><span>Fed Watch</span></div>
    <div id="fedContent" style="display:grid;grid-template-columns:1fr 1fr;gap:8px;"></div>
  </div>

  <div id="calendarSection" style="display:none;margin-bottom:24px;">
    <div class="section-rule"><span>Economic Calendar</span></div>
    <a href="https://www.investing.com/economic-calendar/" target="_blank"
       style="display:block;background:var(--accent);color:var(--paper);text-align:center;padding:14px;border-radius:2px;text-decoration:none;font-family:'Playfair Display',serif;font-size:0.9rem;letter-spacing:0.08em;text-transform:uppercase;border:1px solid var(--gold);">
      Open Economic Calendar &rarr;
    </a>
  </div>

  <div id="contentArea">
    <div class="placeholder">Tap Pull News to load your morning feeds.</div>
  </div>
</div>

<script>
  document.getElementById('dateline').textContent = new Date().toLocaleDateString('en-GB', {
    weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
  });

  const FEEDS = [
    // Central Banks
    { name: 'Federal Reserve', url: 'https://www.federalreserve.gov/feeds/press_all.xml', category: 'central-banks' },
    { name: 'ECB', url: 'https://www.ecb.europa.eu/rss/press.html', category: 'central-banks' },
    { name: 'Bank of England', url: 'https://www.bankofengland.co.uk/rss/news', category: 'central-banks' },
    { name: 'Financial Stability Board', url: 'https://www.fsb.org/feed', category: 'central-banks' },

    // Markets
    { name: 'Exante Data', url: 'https://moneyinsideout.substack.com/feed', category: 'markets' },
    { name: 'Investing.com', url: 'https://www.investing.com/rss/news.rss', category: 'markets' },
    { name: 'Yahoo Finance', url: 'https://finance.yahoo.com/news/rssindex', category: 'markets' },
    { name: 'CNBC Markets', url: 'https://www.cnbc.com/id/20910258/device/rss/rss.html', category: 'markets' },
    { name: 'Financial Times', url: 'https://ft.com/rss/home', category: 'markets' },
    { name: 'Nasdaq', url: 'https://www.nasdaq.com/feed/nasdaq-originals/rss.xml', category: 'markets' },
    { name: 'Benzinga', url: 'https://feeds.benzinga.com/benzinga', category: 'markets' },
    { name: 'Newsquawk', url: 'https://newsquawk.com/blog/feed.rss', category: 'markets' },

    // Geopolitics
    { name: 'AP World News', url: 'https://feeds.apnews.com/rss/apf-worldnews', category: 'geopolitics' },
    { name: 'AP Politics', url: 'https://feeds.apnews.com/rss/apf-politics', category: 'geopolitics' },
    { name: 'Al Jazeera', url: 'https://www.aljazeera.com/xml/rss/all.xml', category: 'geopolitics' },
    { name: 'Foreign Affairs', url: 'https://foreignaffairs.com/rss.xml', category: 'geopolitics' },
    { name: 'War on the Rocks', url: 'https://warontherocks.com/feed', category: 'geopolitics' },
    { name: 'The Independent', url: 'https://www.independent.co.uk/news/world/politics/rss', category: 'geopolitics' },
    { name: 'OilPrice.com', url: 'https://oilprice.com/rss/main', category: 'geopolitics' },

    // Newsletter
    { name: 'Alisdair Macdonald', url: 'https://alisdairmacdonald.substack.com/feed', category: 'newsletter' },
  ];

  let allItems = [];
  let currentFilter = 'all';

  function setStatus(msg, visible = true) {
    const bar = document.getElementById('statusBar');
    bar.textContent = msg;
    bar.className = visible ? 'status-bar visible' : 'status-bar';
  }

  function setFilter(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderFiltered();
  }

  function parseRSS(xmlText) {
    try {
      const parser = new DOMParser();
      const doc = parser.parseFromString(xmlText, 'text/xml');
      const items = Array.from(doc.querySelectorAll('item'));
      return items.slice(0, 8).map(item => ({
        title: item.querySelector('title')?.textContent?.trim() || 'Untitled',
        summary: (item.querySelector('description')?.textContent || '').replace(/<[^>]*>/g, '').trim().slice(0, 240),
        link: item.querySelector('link')?.textContent?.trim() || '',
        pubDate: item.querySelector('pubDate')?.textContent || ''
      }));
    } catch(e) { return []; }
  }

  async function fetchFeed(feed) {
    const proxyUrl = 'https://api.allorigins.win/get?url=' + encodeURIComponent(feed.url) + '&timestamp=' + Date.now();
    try {
      const res = await fetch(proxyUrl);
      const json = await res.json();
      const parsed = parseRSS(json.contents);
      return parsed.map(item => ({
        ...item,
        source: feed.name,
        category: feed.category,
        timestamp: new Date(item.pubDate).getTime() || 0
      }));
    } catch(e) { return []; }
  }

  function renderFiltered() {
    const area = document.getElementById('contentArea');
    const filtered = currentFilter === 'all' ? allItems : allItems.filter(i => i.category === currentFilter);
    if (!filtered.length) {
      area.innerHTML = '<div class="placeholder">No items found.</div>';
      return;
    }
    const grouped = {};
    filtered.forEach(item => {
      if (!grouped[item.source]) grouped[item.source] = [];
      grouped[item.source].push(item);
    });
    area.innerHTML = Object.entries(grouped).map(([source, items]) => `
      <div class="feed-section">
        <div class="section-rule"><span>${source}</span></div>
        <div class="news-items">
          ${items.map(item => `
            <div class="news-item" onclick="this.classList.toggle('expanded')">
              <div class="headline">${item.title}</div>
              <div class="summary">${item.summary}</div>
              <a class="read-more" href="${item.link}" target="_blank">Read more &rarr;</a>
            </div>
          `).join('')}
        </div>
      </div>
    `).join('');
  }

  async function fetchAllFeeds() {
    const btn = document.getElementById('newsBtn');
    btn.textContent = 'Fetching...';
    btn.disabled = true;
    setStatus('Loading feeds...');
    allItems = [];
    const results = await Promise.all(FEEDS.map(fetchFeed));
    results.forEach(items => allItems.push(...items));
    allItems.sort((a, b) => b.timestamp - a.timestamp);
    renderFiltered();
    setStatus('', false);
    btn.textContent = 'Refresh News';
    btn.disabled = false;
  }

  function toggleCalendar() {
    const sec = document.getElementById('calendarSection');
    sec.style.display = sec.style.display === 'none' ? 'block' : 'none';
  }

  function fetchFedWatch() {
    const fedSection = document.getElementById('fedSection');
    const fedContent = document.getElementById('fedContent');
    fedSection.style.display = 'block';
    const today = new Date();
    const fomcDates = [
      new Date('2026-03-18'), new Date('2026-04-29'),
      new Date('2026-06-17'), new Date('2026-07-29'),
      new Date('2026-09-16'), new Date('2026-10-28'),
      new Date('2026-12-09'),
    ];
    const nextMeeting = fomcDates.find(d => d >= today);
    const meetingStr = nextMeeting ? nextMeeting.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' }) : 'TBC';
    const daysUntil = nextMeeting ? Math.ceil((nextMeeting - today) / (1000 * 60 * 60 * 24)) : '';
    fedContent.innerHTML = `
      <div class="fed-card">
        <div class="fed-label">Current Target Range</div>
        <div class="fed-value">4.25% – 4.50%</div>
        <div class="fed-sub">Set January 2026</div>
      </div>
      <div class="fed-card">
        <div class="fed-label">Next FOMC Meeting</div>
        <div class="fed-value" style="font-size:0.9rem;margin-top:4px">${meetingStr}</div>
        <div class="fed-sub">${daysUntil} days away</div>
      </div>
      <div style="grid-column:1/-1;background:var(--card);border:1px solid var(--rule);border-radius:2px;padding:12px;">
        <div style="font-size:0.68rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;">Live Probabilities</div>
        <a href="https://www.cmegroup.com/markets/interest-rates/cme-fedwatch-tool.html" target="_blank"
           style="display:block;background:var(--accent);color:var(--paper);text-align:center;padding:12px;border-radius:2px;text-decoration:none;font-family:'Playfair Display',serif;font-size:0.85rem;letter-spacing:0.08em;text-transform:uppercase;border:1px solid var(--gold);">
          Open CME FedWatch Tool &rarr;
        </a>
      </div>
    `;
    document.getElementById('fedBtn').textContent = 'Refresh Fed Watch';
  }

  function analyseHeadlines() {
    const headlines = Array.from(document.querySelectorAll('.headline'))
      .map(h => h.textContent.trim())
      .filter(Boolean)
      .slice(0, 15)
      .join('\n');

    if (!headlines) {
      alert('Please pull news first.');
      return;
    }

    const prompt = 'You are a seasoned financial and geopolitical analyst. Based on the following headlines, write a concise pre-session briefing in flowing prose. No bullet points, no headers, no em-dashes. Short punchy sentences. Cover what matters for traders opening their session. Be direct and analytical. Do not pad or repeat.\n\nHeadlines:\n' + headlines + '\n\nWrite the briefing now:';

    window.open('https://chatgpt.com/?q=' + encodeURIComponent(prompt), '_blank');
  }
</script>
</body>
</html>
